<!DOCTYPE html>
<html>

<head>
<title>Video Player</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Lecture</h1>

<iframe id="player"
width="90%"
height="500"
frameborder="0"
allowfullscreen>
</iframe>

<script>

let v = new URLSearchParams(window.location.search).get("v")

let video = ""

if(v==1){
video="https://www.youtube.com/embed/VIDEO1"
}
else if(v==2){
video="https://www.youtube.com/embed/VIDEO2"
}
else{
video="https://www.youtube.com/embed/VIDEO3"
}

document.getElementById("player").src = video

</script>

</body>
</html>
