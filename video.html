<!DOCTYPE html>
<html>
<head>
<title>Lesson</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1 style="text-align:center">Lesson Video</h1>

<div style="text-align:center">
<video id="lessonVideo" controls width="80%"></video>
</div>

<script src="js/script.js"></script>

<script>
let video = localStorage.getItem("selectedVideo")
let player = document.getElementById("lessonVideo")

if(video === "video1"){
  player.src = "https://www.w3schools.com/html/mov_bbb.mp4"
}
if(video === "video2"){
  player.src = "https://www.w3schools.com/html/movie.mp4"
}
</script>

</body>
</html>
